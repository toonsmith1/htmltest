// ═══════════ JSONP FETCH ═══════════
function fetchData() {
  $("statusText").textContent = "⏳ กำลังดึงข้อมูล...";
  $("errorBox").classList.add("hidden");

  const cbName = "_cb_" + Date.now();
  const timeout = setTimeout(() => {
    cleanup();
    showError("หมดเวลาเชื่อมต่อ — ลองกดรีเฟรชอีกครั้ง");
    $("statusText").textContent = "❌ โหลดไม่สำเร็จ";
  }, 20000);

  function cleanup() {
    clearTimeout(timeout);
    delete window[cbName];
    const el = document.getElementById(cbName);
    if (el) el.remove();
  }

  window[cbName] = function(result) {
    cleanup();
    if (result && result.success) {
      sheetData = result.data;
      const now = new Date();
      $("statusText").innerHTML = `✅ อัปเดตล่าสุด: ${now.toLocaleTimeString("th-TH")}`;
      $("errorBox").classList.add("hidden");
      renderDashboard();
    } else {
      showError(result?.error || "ไม่สามารถดึงข้อมูลได้");
    }
  };

  const script = document.createElement("script");
  script.id = cbName;
  script.src = WEB_APP_URL + "?callback=" + cbName;
  script.onerror = function() {
    cleanup();
    showError("โหลดข้อมูลไม่ได้ — ตรวจสอบ Apps Script URL");
    $("statusText").textContent = "❌ โหลดไม่สำเร็จ";
  };
  document.body.appendChild(script);
}

function showError(msg) {
  $("errorBox").textContent = "❌ " + msg;
  $("errorBox").classList.remove("hidden");
}

// ═══════════ PAGE NAVIGATION ═══════════
function showPage(page) {
  currentPage = page;
  document.querySelectorAll(".nav-btn").forEach((b, i) => {
    b.classList.toggle("active", ["dashboard","form","report","script"][i] === page);
  });
  ["dashboard","form","report","script"].forEach(p => {
    $("page-"+p).classList.toggle("hidden", p !== page);
  });
  if (page === "form") renderForm();
  if (page === "report") renderReport();
  if (page === "script") renderScript();
  if (page === "dashboard") renderDashboard();
}

  for (const t of SHEET_TYPES) {
    const d = sheetData[t.id];
    if (!d || !d.rows) { stats[t.id] = {count:0,total:0,statusCounts:{},items:[]}; continue; }
    const cm = COL_MAP[t.id];
    let total = 0;
    const statusCounts = {};
    const items = [];
    d.rows.forEach((r, originalIdx) => {
      if (!(r[cm.project]||"").trim() && !(r[cm.party]||"").trim()) return;
      const amt = parseMoney(r[cm.amount]);
      total += amt;
      const st = (r[cm.status]||"").trim();
      if (st && st !== "-") statusCounts[st] = (statusCounts[st]||0) + 1;
      items.push({ no:r[cm.no], date:r[cm.date], party:r[cm.party], project:r[cm.project], amount:amt, status:st, _rowIndex: originalIdx });
    });
    stats[t.id] = { count:items.length, total, statusCounts, items };
    grandTotal += total;
    grandCount += items.length;
  }
  return { byType:stats, grandTotal, grandCount };
}

// ═══════════ SVG DONUT ═══════════
function svgDonut(counts, size) {
  const entries = Object.entries(counts).filter(([,v])=>v>0);
  const total = entries.reduce((s,[,v])=>s+v,0);
  if (!total) return `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:#475569;font-size:12px">—</div>`;
  let cum = 0;
  const r=36, cx=50, cy=50;
  let paths = "";
  for (const [status, count] of entries) {
    const angle = (count/total)*360;
    const s1 = cum, s2 = cum + angle; cum += angle;
    const st = sc(status);
    const la = angle > 180 ? 1 : 0;
    const a1 = (s1-90)*Math.PI/180, a2 = (s2-90)*Math.PI/180;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    paths += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2}" fill="none" stroke="${st.dot}" stroke-width="12"/>`;
  }
  return `<div style="position:relative;width:${size}px;height:${size}px">
    <svg viewBox="0 0 100 100" width="${size}" height="${size}">${paths}</svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <span style="font-size:22px;font-weight:700;color:#f1f5f9;line-height:1">${total}</span>
      <span style="font-size:9px;color:#64748b;margin-top:2px">รายการ</span>
    </div></div>`;
}

  const values = fields.map(f => { const el=$("f_"+f.key); return el?el.value:""; });
  const isEdit = editMode && editMode.sheetType === formType;

    await fetch(WEB_APP_URL, {

}

const SCRIPT_CODE = `var SHEET_ID = "1kGSQKzbaZQ_CW8vw4qBpEmK4g44JzrGPOFGcobCN1hY";

var SHEET_CONFIG = {
  contract:  { name: "เลขที่สัญญา" },
  po:        { name: "เลขที่ใบสั่งซื้อ/จ้าง/เช่า" },
  agreement: { name: "เลขที่ข้อตกลง" }
};

function doGet(e) {
  var callback = (e && e.parameter && e.parameter.callback) ? e.parameter.callback : null;
  try {
    var ss = SpreadsheetApp.openById(SHEET_ID);
    var result = {};
    var keys = Object.keys(SHEET_CONFIG);
    for (var i = 0; i < keys.length; i++) {
      var key = keys[i];
      var config = SHEET_CONFIG[key];
      var sheet = ss.getSheetByName(config.name);
      if (!sheet || sheet.getLastRow() <= 1) { result[key] = { headers: [], rows: [] }; continue; }
      var data = sheet.getDataRange().getValues();
      var headers = [];
      for (var h = 0; h < data[0].length; h++) headers.push(String(data[0][h]).replace(/\\n/g, " ").trim());
      var rows = [];
      for (var r = 1; r < data.length; r++) {
        var row = [];
        for (var c = 0; c < data[r].length; c++) {
          var cell = data[r][c];
          if (cell instanceof Date) row.push(("0"+cell.getDate()).slice(-2)+"/"+("0"+(cell.getMonth()+1)).slice(-2)+"/"+cell.getFullYear());
          else row.push(String(cell));
        }
        rows.push(row);
      }
      result[key] = { headers: headers, rows: rows };
    }
    var jsonStr = JSON.stringify({ success: true, data: result });
    if (callback) return ContentService.createTextOutput(callback+"("+jsonStr+")").setMimeType(ContentService.MimeType.JAVASCRIPT);
    return ContentService.createTextOutput(jsonStr).setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    var errStr = JSON.stringify({ success: false, error: err.toString() });
    if (callback) return ContentService.createTextOutput(callback+"("+errStr+")").setMimeType(ContentService.MimeType.JAVASCRIPT);
    return ContentService.createTextOutput(errStr).setMimeType(ContentService.MimeType.JSON);
  }
}

function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var action = data.action || "append";
    if (!SHEET_CONFIG[data.sheetType]) return jsonResp({ success: false, error: "ไม่พบประเภท" });
    var ss = SpreadsheetApp.openById(SHEET_ID);
    var sheet = ss.getSheetByName(SHEET_CONFIG[data.sheetType].name);
    if (!sheet) return jsonResp({ success: false, error: "ไม่พบ sheet" });

    if (action === "update" && data.rowIndex) {
      // อัปเดตแถวเดิม (rowIndex = row number in sheet, 1-indexed)
      var row = data.rowIndex;
      var vals = data.values;
      for (var i = 0; i < vals.length; i++) {
        sheet.getRange(row, i + 1).setValue(vals[i]);
      }
      return jsonResp({ success: true, message: "อัปเดตสำเร็จ แถว " + row });
    } else {
      // เพิ่มแถวใหม่
      sheet.appendRow(data.values);
      return jsonResp({ success: true, message: "บันทึกสำเร็จ", row: sheet.getLastRow() });
    }
  } catch (err) { return jsonResp({ success: false, error: err.toString() }); }
}

function jsonResp(obj) { return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON); }`;

  const el = $("page-report");
  const stats = computeStats();
  if (!stats) { el.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#475569"><div style="font-size:48px;margin-bottom:16px">📥</div><div style="font-size:14px">กดรีเฟรชเพื่อโหลดข้อมูลก่อน</div></div>`; return; }

  let html = `<div class="fade-up">
    <div class="card" style="margin-bottom:16px">
      <h3 style="margin:0 0 6px;font-size:16px;font-weight:700;color:#f1f5f9">📥 ออกรายงาน สขร.1</h3>
      <p style="margin:0;font-size:12.5px;color:#64748b">เลือกรายการที่ต้องการออกรายงาน แล้วกดปุ่มด้านล่าง</p>
    </div>

    <!-- Month input -->
    <div class="card" style="margin-bottom:16px;padding:14px 18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <label style="font-size:13px;color:#94a3b8;white-space:nowrap">📅 เดือนที่รายงาน:</label>
      <input class="inp" id="reportMonth" type="text" placeholder="เช่น มีนาคม 2569" style="max-width:250px;font-size:14px">
    </div>`;

  // Tables with checkboxes for each type
  for (const t of SHEET_TYPES) {
    const st = stats.byType[t.id];
    if (!st.count) continue;
    html += `<div class="card fade-up" style="margin-bottom:16px;padding:0;overflow:hidden">
      <div style="padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:14px;font-weight:600;color:#f1f5f9">${t.icon} ${t.label} <span style="font-size:12px;font-weight:400;color:#64748b">(${st.count} รายการ)</span></div>
        <label style="font-size:12px;color:#38bdf8;cursor:pointer;display:flex;align-items:center;gap:5px">
          <input type="checkbox" class="chk" onchange="toggleAllReport('${t.id}',this.checked)"> เลือกทั้งหมด
        </label>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th style="width:36px"></th><th>เลขที่</th><th>คู่สัญญา/ผู้ขาย</th><th>รายการ</th><th style="text-align:right">วงเงิน</th><th>สถานะ</th></tr></thead>
        <tbody>${st.items.map(item=>{
          const s = sc(item.status);
          const ri = item._rowIndex;
          const isChecked = selectedItems.some(x=>x.sheetType===t.id && x.rowIndex===ri);
          return `<tr>
            <td><input type="checkbox" class="chk" ${isChecked?"checked":""} onchange="toggleItemReport('${t.id}',${ri},this.checked)"></td>
            <td style="font-weight:600;color:#e2e8f0;white-space:nowrap">${esc(item.no)}</td>
            <td style="color:#cbd5e1;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.party||"")}</td>
            <td style="color:#94a3b8;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.project||"")}</td>
            <td class="mono" style="text-align:right;color:#e2e8f0;white-space:nowrap">${fmtMoney(item.amount)}</td>
            <td>${item.status?`<span class="status-badge" style="background:${s.bg};color:${s.fg}"><span class="status-dot" style="background:${s.dot}"></span>${esc(item.status)}</span>`:""}</td>
          </tr>`;}).join("")}</tbody>
      </table></div></div>`;
  }

  // Summary + export button
  html += `<div id="reportSummary"></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn-primary" style="flex:1;padding:14px" onclick="exportReport()">📥 ดาวน์โหลด สขร.1 (Excel)</button>
      <button class="btn-ghost" style="padding:14px" onclick="selectedItems=[];renderReport()">🗑️ ล้างการเลือก</button>
    </div>
    <div id="reportStatus" style="margin-top:14px"></div>
  </div>`;

  el.innerHTML = html;
  updateReportSummary();
}

function toggleItemReport(sheetType, rowIndex, checked) {
  if (checked) {
    if (!selectedItems.some(x=>x.sheetType===sheetType && x.rowIndex===rowIndex)) {
      selectedItems.push({ sheetType, rowIndex, rawRow: sheetData[sheetType].rows[rowIndex], headers: sheetData[sheetType].headers });
    }
  } else {
    selectedItems = selectedItems.filter(x=>!(x.sheetType===sheetType && x.rowIndex===rowIndex));
  }
  updateReportSummary();
}

function toggleAllReport(sheetType, checked) {
  const stats = computeStats();
  if (!stats) return;
  const items = stats.byType[sheetType].items;
  if (checked) {
    items.forEach(item => {
      if (!selectedItems.some(x=>x.sheetType===sheetType && x.rowIndex===item._rowIndex)) {
        selectedItems.push({ sheetType, rowIndex: item._rowIndex, rawRow: sheetData[sheetType].rows[item._rowIndex], headers: sheetData[sheetType].headers });
      }
    });
  } else {
    selectedItems = selectedItems.filter(x=>x.sheetType!==sheetType);
  }
  renderReport();
}

function updateReportSummary() {
  const el = $("reportSummary");
  if (!el) return;
  if (!selectedItems.length) {
    el.innerHTML = `<div style="padding:14px 18px;border-radius:10px;background:rgba(148,163,184,0.05);border:1px solid var(--border);font-size:13px;color:#475569;text-align:center">ยังไม่ได้เลือกรายการ — กดเลือกจากตารางด้านบน</div>`;
    return;
  }
  const totalAmt = selectedItems.reduce((s,x) => s + parseMoney(x.rawRow[COL_MAP[x.sheetType].amount]), 0);
  el.innerHTML = `<div style="padding:14px 18px;border-radius:10px;background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);font-size:13px;color:#e2e8f0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <span>✅ เลือกแล้ว <b style="color:#38bdf8">${selectedItems.length}</b> รายการ</span>
    <span>รวมวงเงิน <b class="mono" style="color:#fbbf24">฿${fmtMoney(totalAmt)}</b></span>
  </div>`;
}

// ═══════════ EXPORT EXCEL สขร.1 ═══════════
async function exportReport() {
  if (!selectedItems.length) {
    $("reportStatus").innerHTML = `<div class="error-box">❌ กรุณาเลือกรายการก่อน</div>`;
    return;
  }
  const monthName = ($("reportMonth")||{}).value || "___";
  if (!monthName || monthName === "___") {
    $("reportStatus").innerHTML = `<div class="error-box">❌ กรุณากรอกชื่อเดือนก่อน</div>`;
    return;
  }
  $("reportStatus").innerHTML = `<div style="padding:10px 14px;border-radius:10px;font-size:13px;color:#38bdf8;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2)">⏳ กำลังสร้างไฟล์...</div>`;

  const wb = new ExcelJS.Workbook();
  const thin = {style:'thin',color:{argb:'FF000000'}};
  const border = {top:thin,bottom:thin,left:thin,right:thin};
  const fontTH = {name:'TH SarabunPSK',size:16};
  const fontTHBold = {name:'TH SarabunPSK',size:16,bold:true};
  const centerWrap = {horizontal:'center',vertical:'middle',wrapText:true};
  const leftWrap = {vertical:'middle',wrapText:true};

  // ═══ SHEET 1: สรุปผล สขร.1 ═══
  const ws1 = wb.addWorksheet("สขร.1 " + monthName.slice(0,10));
  ws1.columns = [
    {width:6},{width:38},{width:16},{width:14},{width:14},
    {width:10},{width:14},{width:10},{width:10},{width:14},{width:14},
    {width:22},{width:28},{width:20}
  ];

  // Title
  ws1.mergeCells('A1:M1');
  const r1 = ws1.getCell('A1');
  r1.value = "สรุปผลการดำเนินการจัดซื้อจัดจ้างในรอบเดือน" + monthName;
  r1.font = fontTHBold; r1.alignment = {horizontal:'center'};

  ws1.mergeCells('A2:M2');
  const r2 = ws1.getCell('A2');
  r2.value = "สำนักงานเศรษฐกิจการเกษตร ศูนย์ข้อมูลเกษตรแห่งชาติ";
  r2.font = fontTHBold; r2.alignment = {horizontal:'center'};

  // Header row 4
  const hdr = ['ลำดับ','งานจัดซื้อจัดจ้าง','วงเงินที่จะซื้อหรือจ้าง','ราคากลาง','วิธีซื้อ/จ้าง',
    'รายชื่อผู้เสนอราคาและราคาที่เสนอ','','','ผู้ได้รับการจัดเลือกและราคาที่ตกลงซื้อหรือจ้าง','','',
    'เหตุผลที่คัดเลือกโดยสรุป','เลขที่และวันที่ของสัญญาหรือข้อตกลงในการซื้อหรือจ้าง','เลขที่โครงการ'];
  const hdrRow = ws1.getRow(4);
  hdr.forEach((v,i) => { const c = hdrRow.getCell(i+1); c.value = v; c.font = fontTHBold; c.alignment = centerWrap; c.border = border; });
  ws1.mergeCells('F4:H4'); ws1.mergeCells('I4:K4');
  hdrRow.height = 42;

  // Data rows
  let row = 5;
  selectedItems.forEach((sel, idx) => {
    const cm = COL_MAP[sel.sheetType];
    const d = sel.rawRow;
    const typeLabel = sel.sheetType==='contract'?'สัญญา':(sel.sheetType==='po'?'ใบสั่งจ้าง':'ข้อตกลง');

    // Row 1 of record
    const r1 = ws1.getRow(row);
    r1.getCell(1).value = idx+1;
    r1.getCell(2).value = d[cm.project]||"";
    r1.getCell(3).value = parseMoney(d[cm.amount]);
    r1.getCell(3).numFmt = '#,##0.00';
    r1.getCell(4).value = parseMoney(d[cm.amount]);
    r1.getCell(4).numFmt = '#,##0.00';
    r1.getCell(5).value = "เฉพาะเจาะจง";
    r1.getCell(6).value = d[cm.party]||"";
    r1.getCell(9).value = d[cm.party]||"";
    r1.getCell(12).value = "เป็นผู้มีคุณสมบัติตรงตามเงื่อนไขที่กำหนด";
    r1.getCell(13).value = typeLabel + " เลขที่ " + (d[0]||"");
    r1.getCell(14).value = d[1]||""; // egp
    for(let c=1;c<=14;c++){r1.getCell(c).font=fontTH;r1.getCell(c).alignment=leftWrap;r1.getCell(c).border=border;}
    ws1.mergeCells(row,6,row,8);
    ws1.mergeCells(row,9,row,11);
    r1.height = 33;

    // Row 2 of record (price detail)
    row++;
    const r2 = ws1.getRow(row);
    r2.getCell(6).value = "เสนอราคา";
    r2.getCell(7).value = parseMoney(d[cm.amount]);
    r2.getCell(7).numFmt = '#,##0.00';
    r2.getCell(8).value = "บาท";
    r2.getCell(9).value = "เสนอราคา";
    r2.getCell(10).value = parseMoney(d[cm.amount]);
    r2.getCell(10).numFmt = '#,##0.00';
    r2.getCell(11).value = "บาท";
    r2.getCell(13).value = d[cm.date]||"";
    for(let c=1;c<=14;c++){r2.getCell(c).font=fontTH;r2.getCell(c).alignment=leftWrap;r2.getCell(c).border=border;}
    r2.height = 20;
    row++;
  });

  // ═══ SHEET 2: สาระสำคัญ ═══
  const ws2 = wb.addWorksheet("สาระสำคัญ " + monthName.slice(0,10));
  ws2.columns = [{width:8},{width:28},{width:18},{width:10},{width:10},{width:18},{width:10},{width:22},{width:10},{width:14},{width:14},{width:18},{width:22}];

  let r = 1;
  selectedItems.forEach((sel) => {
    const cm = COL_MAP[sel.sheetType];
    const d = sel.rawRow;
    const h = sel.headers;
    const typeLabel = sel.sheetType==='contract'?'สัญญา เลขที่':(sel.sheetType==='po'?'ใบสั่งจ้าง เลขที่':'ข้อตกลง เลขที่');
    // Column mapping for agreement is different

    const taxIdx = sel.sheetType==='agreement'?5:6;
    const controlIdx = sel.sheetType==='agreement'?2:2;

    const setCell = (row,col,val,bold) => {

    setCell(r,1,"ข้อมูลสาระสำคัญในสัญญา",true);
    r++;
    setCell(r,1,1); setCell(r,2,"หน่วยงาน"); setCell(r,3,"ศูนย์ข้อมูลเกษตรแห่งชาติ สำนักงานเศรษฐกิจการเกษตร");
    r++;
    setCell(r,1,2); setCell(r,2,"เลขที่โครงการ"); setCell(r,3,d[egpIdx]||"");
    r++;
    setCell(r,1,3); setCell(r,2,"ชื่อโครงการ"); setCell(r,3,d[cm.project]||"");
    r++;
    setCell(r,1,4); setCell(r,2,"งบประมาณ"); setCell(r,3,"*"); setCell(r,4,"บาท");
    r++;
    setCell(r,1,5); setCell(r,2,"ราคากลาง");
    const c6 = ws2.getCell(r,3); c6.value = parseMoney(d[cm.amount]); c6.numFmt='#,##0.00'; c6.font=fontTH;
    setCell(r,4,"บาท");
    r++;
    setCell(r,1,6); setCell(r,2,"รายชื่อผู้เสนอราคา มีดังนี้");
    r++;
    // Sub-header
    setCell(r,1,"ลำดับ",true); setCell(r,2,"รายการพิจารณา",true); setCell(r,5,"เลขประจำตัวผู้เสียภาษีอากร",true); setCell(r,7,"รายชื่อผู้เสนอราคา",true); setCell(r,11,"ราคาที่เสนอ",true);
    r++;
    setCell(r,1,1); setCell(r,2,d[cm.project]||""); setCell(r,5,d[taxIdx]||""); setCell(r,7,d[cm.party]||"");
    const c11 = ws2.getCell(r,11); c11.value = parseMoney(d[cm.amount]); c11.numFmt='#,##0.00'; c11.font=fontTH;
    r += 4; // blank rows

    setCell(r,1,7); setCell(r,2,"ผู้ที่ได้รับการคัดเลือกได้แก่");
    r++;
    setCell(r,1,"ลำดับ",true); setCell(r,2,"เลขประจำตัวผู้เสียภาษีอากร",true); setCell(r,3,"ชื่อผู้ขาย",true);
    setCell(r,7,"เลขคุมสัญญาในระบบ e-GP",true); setCell(r,8,typeLabel.split(" ")[0]+" เลขที่",true);
    setCell(r,9,"วันที่ทำสัญญา/ใบสั่ง",true); setCell(r,10,"จำนวนเงิน",true); setCell(r,11,"สถานะสัญญา",true); setCell(r,12,"เหตุผลที่คัดเลือก",true);
    r += 2;
    setCell(r,1,1); setCell(r,2,d[taxIdx]||""); setCell(r,3,d[cm.party]||"");
    setCell(r,7,d[controlIdx]||""); setCell(r,8,d[0]||""); setCell(r,9,d[cm.date]||"");
    const c10 = ws2.getCell(r,10); c10.value = parseMoney(d[cm.amount]); c10.numFmt='#,##0.00'; c10.font=fontTH;
    setCell(r,11,d[cm.status]||""); setCell(r,12,"เป็นผู้มีคุณสมบัติตรงตามเงื่อนไขที่กำหนด");
    r += 7; // spacing before next record
  });

  // ─── Download ───
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `สขร1_${monthName.replace(/\s/g,'')}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
  $("reportStatus").innerHTML = `<div class="success-box">✅ ดาวน์โหลดสำเร็จ! — สขร1_${esc(monthName)}.xlsx</div>`;
}

// ═══════════ INIT ═══════════
fetchData();
</script>
